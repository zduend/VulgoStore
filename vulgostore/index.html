<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VulgoStore | Camisas de Time</title>
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topo">

    <div class="logo">
        <img src="img/logo.png" alt="VulgoStore">
    </div>

    <a class="whats"
       href="https://wa.me/5561982065232"
       target="_blank">
       WhatsApp
    </a>

</header>

  <section class="banner-principal">
  <div class="banner-conteudo">

    <img src="img/logo.png" class="logo-banner" alt="VulgoStore">

    <h1>
  CAMISAS IMPORTADAS<br>
  <strong>QUALIDADE PREMIUM</strong>
</h1>

<p>
  Mais de 300 modelos disponíveis. Escolha sua camisa e faça o pedido direto pelo WhatsApp.
</p>

<div class="botoes-banner">
  <a href="#catalogo" class="botao-banner">VER CATÁLOGO</a>
  <a href="https://wa.me/5561982065232" target="_blank" class="botao-whats-banner">WHATSAPP</a>
</div>


  </div>

  <div class="banner-imagens">
    <img src="img/brasil-preta.png" alt="Brasil Black">
    <img src="img/brasil-amarela.png" alt="Brasil Amarela">
    <img src="img/flamengo.png" alt="Flamengo">
  </div>
</section>

  <main class="catalogo" id="catalogo"></main>

  <section class="futuro">
    <h2>Em breve</h2>
    <p>Camisas NBA e NFL disponíveis futuramente.</p>
  </section>

  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="fechar" onclick="fecharModal()">×</button>
      <img id="produtoImagem" src="" alt="Camisa selecionada" />
      <h2 id="produtoNome"></h2>
      <p class="preco">
    
</p>

<p class="info-personalizacao">
    ✍️ Personalização (nome + número): <strong>+ R$ 35,00</strong><br>
    
</p>

      <label>Tamanho</label>
      <select id="tamanho">
        <option>P</option><option>M</option><option>G</option><option>GG</option><option>G1</option><option>G2</option>
      </select>

      <label>Personalização</label>

<div class="opcoes-personalizacao">

<label class="radio-personalizacao">
    <input type="radio"
           name="personalizacao"
           value="nao"
           checked
           onchange="alterarPersonalizacao()">

    Sem personalização
</label>

<label class="radio-personalizacao">
    <input type="radio"
           name="personalizacao"
           value="sim"
           onchange="alterarPersonalizacao()">

    Nome + Número
    
</label>

</div>

<p class="preco" id="produtoPreco">
</p>

<div id="dadosPersonalizacao" style="display:none;">

<label>Nome na camisa</label>
<input id="nomeCamisa" placeholder="Ex: MESSI">

<label>Número</label>
<input id="numeroCamisa" placeholder="Ex: 10">

</div>

      <label>Quantidade</label>
      <input id="quantidade" type="number" value="1" min="1" />

      <label>Nome do cliente</label>
      <input id="cliente" placeholder="Seu nome" />

      <button class="pedido" onclick="enviarPedido()">Enviar pedido no WhatsApp</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
